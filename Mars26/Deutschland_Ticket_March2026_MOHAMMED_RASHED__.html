<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>D-Ticket - MOHAMMED RASHED /</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica Neue,Arial,sans-serif;background:#f8f8f8;display:flex;justify-content:center;padding:20px}
        .ticket-wrapper-download{max-width:420px;width:100%;background:#fff;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.15);padding:20px;display:flex;flex-direction:column;align-items:center}
        .ticket{background:#fff;border-radius:16px;padding:20px;width:100%;display:flex;flex-direction:column;gap:18px;border:2px solid #005c99;position:relative}
        .ticket-status{display:flex;align-items:center;gap:5px;position:absolute;top:20px;right:20px}
        .ticket-status-dot{width:10px;height:10px;background:#28a745;border-radius:50%;animation:pulse 2s infinite}
        .ticket-status-text{font-size:14px;font-weight:700;color:#28a745;text-transform:uppercase}
        .ticket-header{display:flex;justify-content:space-between;border-bottom:2px solid #db3b3b;padding-bottom:15px}
        .ticket-logo{display:flex;align-items:center;font-size:20px;font-weight:900;color:#005c99}
        .ticket-logo .circle{background:#db3b3b;color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-right:5px;border:2px solid #fff;box-shadow:0 0 0 2px #005c99}
        .qrcode-container{width:100%;display:flex;flex-direction:column;align-items:center;gap:15px;padding:15px 0;border-bottom:1px dashed #ddd}
        .qrcode{width:250px;height:250px;border:2px solid #ddd;padding:5px;display:flex;justify-content:center}
        .qrcode img{width:100%;height:100%}
        .progress-bar-container{height:6px;width:250px;background:#e0e0e0;border-radius:3px;overflow:hidden;position:relative}
        .progress-bar{position:absolute;height:100%;width:35%;background:linear-gradient(90deg,#005c99,#3498db,#005c99);animation:slide 4s linear infinite}
        .info-block{border-bottom:1px solid #eee;padding:10px 0;display:flex;align-items:center;gap:15px}
        .info-block.two-col{display:grid;grid-template-columns:1fr 1fr}
        .info-block .icon{font-size:22px;color:#db3b3b}
        .label{font-size:11px;color:#555;font-weight:700;text-transform:uppercase}
        .value{font-size:15px;font-weight:600}
        .ticket-footer{font-size:12px;color:#333;text-align:center;margin-top:10px;border-top:1px solid #eee;padding-top:10px}
        @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(40,167,69,0.7)}70%{box-shadow:0 0 0 10px rgba(40,167,69,0)}100%{box-shadow:0 0 0 0 rgba(40,167,69,0)}}
        @keyframes slide{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}
